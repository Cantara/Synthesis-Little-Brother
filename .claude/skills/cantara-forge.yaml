  Forge (repo: Synthesis-Little-Brother) is a KCP-native project scaffolding CLI.
  Generates company-standard projects from versioned template manifests. Sibling to
  Synthesis: Synthesis indexes what exists, Forge creates what is needed.

  Trigger phrases: "forge, project scaffolding, forge template, forge generate,
  synthesis little brother, project generator, template manifest, forge-template.yaml,
