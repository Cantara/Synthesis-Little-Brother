forge_version: "0.1"
template:
  id: react-base
  name: "React + Vite Base"
  version: "1.0.0"
  description: "Minimal React project with Vite"
  tags: [react, typescript, frontend]
variables:
  - name: projectName
    description: "Project name"
    type: string
    required: true
    prompt: "Project name"
  - name: description
    description: "Project description"
    type: string
    default: "A React project"
    prompt: "Project description"
  - name: nodeVersion
    description: "Node.js version"
    type: string
    default: "20"
    prompt: "Node.js version"
